server {
    listen 8080; # Локальный порт внутри Docker сети
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    # Ошибка 404/500 не должна выдавать стандартные заголовки Nginx
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
