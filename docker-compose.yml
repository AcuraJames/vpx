services:
  # 1. Nginx (Self-Steal)
  web-site:
    image: nginx:alpine
    container_name: vpx-nginx
    restart: always
    ports:
      - "443:443"       # Основной HTTPS порт (Reality ловит трафик тут)
      - "8443:8443"     # Резервный порт для Shadowsocks-2022
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/html:/usr/share/nginx/html:ro

  # 2. Core (VLESS-Reality + Shadowsocks + monitoring)
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: vpx-xray
    restart: always
    # Разделяем сетевой стек с Nginx для защиты от тайминг-атак DPI
    network_mode: "service:web-site"
    command: ["run", "-c", "/etc/xray/config.json"]
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
    depends_on:
      - web-site

  # 3. MTProto proxy (9seconds/mtg)
  mtproto-proxy:
    image: nineseconds/mtg:2
    container_name: vpx-mtg
    restart: always
    ports:
      - "216.57.111.92:1443:1443"
    entrypoint: ["/mtg"]
    command: ["simple-run", "0.0.0.0:1443", "${MTG_SECRET}", "--concurrency=512", "--antireplay-cache-size=8MB", "--timeout=30s"]
    # Секрет задаётся в .env

