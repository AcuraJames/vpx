name: Deploy VPX

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/vpx
            git pull origin main
            export XRAY_UUID="${{ secrets.XRAY_UUID }}"
            export XRAY_PRIVATE_KEY="${{ secrets.XRAY_PRIVATE_KEY }}"
            export SS_PASSWORD="${{ secrets.SS_PASSWORD }}"
            export MTG_SECRET="${{ secrets.MTG_SECRET }}"
            export REALITY_SERVER_NAME="${{ secrets.REALITY_SERVER_NAME }}"
            bash deploy.sh
